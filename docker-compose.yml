# Fully self-contained llm-bridge stack. No host bind-mounts, no shared
# state, no services expected on the host. `docker compose up` brings up:
#
#   llm-bridge-server  bridge + mock-harness + claudecode wrapper + claude CLI
#   log-store          durable event log + materialized message history
#   auth-store         credential vault used by harness manifests
#   kanban-store       boards/columns/cards used by the bridge-ui kanban page
#   usage-store        token + spend tracking surfaced in the bridge-ui usage page
#   llmux              token-auth UI in front of all of the above
#
# Prereq:
#   ./scripts/bootstrap.sh        # clone every sibling repo
#   cp .env.docker.example .env   # set LLMUX_TOKEN, ANTHROPIC_API_KEY
#   docker compose up --build
#   open http://localhost:18870   # paste LLMUX_TOKEN
#
# Host-port mappings (offset to 18xxx so the stack doesn't collide with a
# host-side server already running on canonical ports):
#
#   bridge       18860 → 8160        LLM_BRIDGE_HOST_PORT
#   llmux UI     18870 → 8170        LLMUX_HOST_PORT
#   log-store    18875 → 8175        LOG_STORE_HOST_PORT
#   auth-store   18803 → 8303        AUTH_STORE_HOST_PORT
#   kanban-store 18805 → 8305        KANBAN_STORE_HOST_PORT
#   usage-store  18885 → 8185        USAGE_STORE_HOST_PORT
#
# Harnesses available in the container:
#   mock          works out of the box, no creds
#   claude_code   works when ANTHROPIC_API_KEY is set in .env

services:
  llm-bridge-server:
    build:
      context: ..
      dockerfile: llm-bridge-server/Dockerfile
      target: server-full
    image: llm-bridge-server:full
    ports:
      - "${LLM_BRIDGE_HOST_PORT:-18860}:8160"
    environment:
      LLMBRIDGE_LOG_STORE_URL: http://log-store:8175
      AUTH_STORE_URL: http://auth-store:8303
      AUTH_STORE_TOKEN: ${AUTHSTORE_TOKEN:-}
      # tool-store + skill-store + permission-store are not yet packaged
      # into this compose stack (tool-store + skill-store have no public
      # remotes yet; permission-store hard-binds 127.0.0.1 and needs a
      # sibling-repo fix to be container-reachable). The bridge logs a
      # warning and degrades when these URLs are unreachable.
      LLMBRIDGE_TOOL_STORE_URL: http://tool-store:8302
      LLMBRIDGE_PERMISSION_STORE_URL: http://permission-store:8304
      # Real claude_code sessions read this from env. Leave blank and the
      # mock harness still works; chat against claude_code will fail at
      # auth, which is the honest signal.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - bridge-data:/data
    depends_on:
      - log-store
      - auth-store

  log-store:
    build:
      context: ..
      dockerfile: llm-bridge-server/Dockerfile
      target: log-store
    image: log-store:local
    ports:
      - "${LOG_STORE_HOST_PORT:-18875}:8175"
    environment:
      LOG_STORE_LOGSTACK_URL: http://logstack:8081
    volumes:
      - log-store-data:/data

  auth-store:
    build:
      context: ..
      dockerfile: llm-bridge-server/Dockerfile
      target: auth-store
    image: auth-store:local
    ports:
      - "${AUTH_STORE_HOST_PORT:-18803}:8303"
    environment:
      AUTHSTORE_TOKEN: ${AUTHSTORE_TOKEN:-}
      AUTHSTORE_CALLBACK_URL: http://localhost:${AUTH_STORE_HOST_PORT:-18803}/oauth/callback
    volumes:
      - auth-store-data:/data

  kanban-store:
    build:
      context: ..
      dockerfile: llm-bridge-server/Dockerfile
      target: kanban-store
    image: kanban-store:local
    ports:
      - "${KANBAN_STORE_HOST_PORT:-18805}:8305"
    volumes:
      - kanban-store-data:/data

  usage-store:
    build:
      context: ..
      dockerfile: llm-bridge-server/Dockerfile
      target: usage-store
    image: usage-store:local
    ports:
      - "${USAGE_STORE_HOST_PORT:-18885}:8185"
    environment:
      AUTH_STORE_URL: http://auth-store:8303
      AUTH_STORE_TOKEN: ${AUTHSTORE_TOKEN:-}
    volumes:
      - usage-store-data:/data
    depends_on:
      - auth-store

  llmux:
    build:
      context: ..
      dockerfile: llm-bridge-server/Dockerfile
      target: llmux
    image: llmux:local
    ports:
      - "${LLMUX_HOST_PORT:-18870}:8170"
    environment:
      LLMUX_TOKEN: ${LLMUX_TOKEN:?LLMUX_TOKEN must be set in env or .env}
      LLM_BRIDGE_URL: http://llm-bridge-server:8160
      USAGE_STORE_URL: http://usage-store:8185
      KANBAN_STORE_URL: http://kanban-store:8305
      # llmux still routes /api/skill-store and /api/tool-store to these
      # URLs; the proxy returns 502 to the UI when the upstream isn't
      # there, which is the right signal until those services are OSS.
      SKILL_STORE_URL: http://skill-store:8301
      TOOL_STORE_URL: http://tool-store:8302
      PERMISSION_STORE_URL: http://permission-store:8304
    depends_on:
      - llm-bridge-server
      - usage-store
      - kanban-store

volumes:
  bridge-data:
  log-store-data:
  auth-store-data:
  kanban-store-data:
  usage-store-data:
